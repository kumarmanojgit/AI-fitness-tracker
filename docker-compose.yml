version: '3.8'

services:
  # PostgreSQL for User Service
  postgres:
    image: postgres:latest
    container_name: postgres-fitness
    environment:
      POSTGRES_PASSWORD: admin@123
      POSTGRES_DB: fitness_user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for Activity & AI Services
  mongodb:
    image: mongo:latest
    container_name: mongodb-fitness
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ for Message Queue
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq-fitness
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak for OAuth2 (optional, can disable in gateway config for testing)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-fitness
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8181:8080"
    command: start-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongodb_data:
  rabbitmq_data:

networks:
  default:
    name: fitness-network

